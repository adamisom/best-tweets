            const savedTweets = JSON.parse(localStorage.getItem('savedTweets') || '[]');

            container.innerHTML = '';
            emptyState.style.display = filtered.length === 0 ? 'block' : 'none';

            if (filtered.length > 0) {
                matchCountEl.textContent = `${filtered.length} match${filtered.length === 1 ? '' : 'es'}`;
                matchCountEl.style.display = 'block';
            } else {
                matchCountEl.style.display = 'none';
            }

            filtered.forEach(tweet => {
                const div = document.createElement('div');
                div.className = 'tweet';
                const escapedContent = escapeHtml(tweet.content);
                const isSaved = savedTweets.includes(tweet.url);
                div.innerHTML = `
                    <div class="tweet-content">${escapedContent}</div>
                    <div class="tweet-meta">
                        <button class="tweet-save" data-url="${tweet.url}" title="Save tweet" aria-label="Save tweet">${isSaved ? '★' : '☆'}</button>
                        <a href="https://x.com/${tweet.author}" class="tweet-author">@${tweet.author}</a>
                        <span class="tweet-separator">•</span>
                        <a href="${tweet.url}" class="tweet-link">${tweet.url}</a>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function updateCategoryOptions() {
            const author = document.getElementById('authorSearch').value.trim();
            const keyword = document.getElementById('keywordSearch').value.trim();
            const hasActiveFilters = author || keyword;

            const categorySelect = document.getElementById('categoryFilter');
            const categoryData = [
                { label: 'relationships', count: 191 },
                { label: 'growth', count: 148 },
                { label: 'wisdom', count: 77 },
                { label: 'misc', count: 36 },
                { label: 'beauty', count: 19 }
            ];

            const currentValue = categorySelect.value;
            const options = categorySelect.querySelectorAll('option');

            options.forEach((option, index) => {
                if (index === 0) return;
                const cat = categoryData[index - 1];
                if (hasActiveFilters) {
                    option.textContent = cat.label;
                } else {
                    option.textContent = `${cat.label} (${cat.count})`;
                }
            });

            categorySelect.value = currentValue;
        }

        function filterTweets() {
            const author = document.getElementById('authorSearch').value.toLowerCase().replace('@', '');
            const category = document.getElementById('categoryFilter').value;
            const keyword = document.getElementById('keywordSearch').value.toLowerCase().trim().replace(/\s+/g, ' ');
            const savedOnly = document.getElementById('savedFilterBtn').classList.contains('active');
            const savedTweets = JSON.parse(localStorage.getItem('savedTweets') || '[]');

            const filtered = tweetsData.filter(tweet => {
                const matchAuthor = !author || tweet.author.toLowerCase().includes(author);
                const matchCategory = !category || tweet.category === category;
                const matchKeyword = !keyword || tweet.content.toLowerCase().includes(keyword) || tweet.author.toLowerCase().includes(keyword);
                const matchSaved = !savedOnly || savedTweets.includes(tweet.url);
                return matchAuthor && matchCategory && matchKeyword && matchSaved;
            });

            renderTweets(filtered);
            updateCategoryOptions();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        document.getElementById('authorSearch').addEventListener('input', filterTweets);
        document.getElementById('categoryFilter').addEventListener('change', filterTweets);
        document.getElementById('keywordSearch').addEventListener('input', filterTweets);

        document.getElementById('tweetsContainer').addEventListener('click', (e) => {

                const url = e.target.getAttribute('data-url');

                const index = savedTweets.indexOf(url);

                if (index > -1) {
                    savedTweets.splice(index, 1);
                    e.target.textContent = '☆';
                } else {
                    savedTweets.push(url);
                    e.target.textContent = '★';
                }

                localStorage.setItem('savedTweets', JSON.stringify(savedTweets));
            }
        });

        document.getElementById('savedFilterBtn').addEventListener('click', (e) => {
            e.target.classList.toggle('active');
            filterTweets();
        });

        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;

        const savedTheme = localStorage.getItem('theme');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const isDark = savedTheme ? savedTheme === 'dark' : systemDark;

        function setTheme(dark) {
            if (dark) {
                html.classList.add('dark-mode');
                html.classList.remove('light-mode');
                themeToggle.textContent = '☀️';
                localStorage.setItem('theme', 'dark');
            } else {
                html.classList.remove('dark-mode');
                html.classList.add('light-mode');
                themeToggle.textContent = '🌙';
                localStorage.setItem('theme', 'light');
            }
        }

        setTheme(isDark);

        themeToggle.addEventListener('click', (e) => {
            e.preventDefault();
            const currentDark = html.classList.contains('dark-mode');
            setTheme(!currentDark);
        });

        const focusModeBtn = document.getElementById('focusModeBtnSmall');

        function getRandomTweet(tweets = tweetsData) {
            return tweets[Math.floor(Math.random() * tweets.length)];
        }

        function getFilteredTweets() {
            const author = document.getElementById('authorSearch').value.toLowerCase().replace('@', '');
            const category = document.getElementById('categoryFilter').value;
            const keyword = document.getElementById('keywordSearch').value.toLowerCase().trim().replace(/\s+/g, ' ');
            const savedOnly = document.getElementById('savedFilterBtn').classList.contains('active');
            const savedTweets = JSON.parse(localStorage.getItem('savedTweets') || '[]');

            return tweetsData.filter(tweet => {
                const matchAuthor = !author || tweet.author.toLowerCase().includes(author);
                const matchCategory = !category || tweet.category === category;
                const matchKeyword = !keyword || tweet.content.toLowerCase().includes(keyword) || tweet.author.toLowerCase().includes(keyword);
                const matchSaved = !savedOnly || savedTweets.includes(tweet.url);
                return matchAuthor && matchCategory && matchKeyword && matchSaved;
            });
        }

        function toggleFocusMode() {
            const isCurrentlyFocusMode = html.classList.contains('focus-mode');

            if (isCurrentlyFocusMode) {
                // Exit focus mode
                html.classList.remove('focus-mode');
                focusModeBtn.innerHTML = '<span class="focus-mode-btn-emoji">⋆｡ °✩🎧˚☽˚｡⋆</span>';
                filterTweets();
            } else {
                // Enter focus mode
                html.classList.add('focus-mode');
                focusModeBtn.innerHTML = '<strong style="font-size: 1.2em;">Home</strong>';
                const filteredTweets = getFilteredTweets();
                renderRandomTweet(filteredTweets);
            }
        }

        focusModeBtn.addEventListener('click', (e) => {
            e.preventDefault();
            toggleFocusMode();
        });

        const focusModeRefreshBtn = document.getElementById('focusModeRefreshBtn');

        function renderRandomTweet(tweets = tweetsData) {
            const randomTweet = getRandomTweet(tweets);
            const container = document.getElementById('tweetsContainer');

            container.innerHTML = '';
            const div = document.createElement('div');

            div.innerHTML = `
                <a href="${randomTweet.url}" class="tweet-link focus-link">${randomTweet.url}</a>
                <div class="tweet-content">${escapedContent}</div>
            `;
            container.appendChild(div);
        }

        focusModeRefreshBtn.addEventListener('click', (e) => {
            e.preventDefault();
            const filteredTweets = getFilteredTweets();
            renderRandomTweet(filteredTweets);
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && html.classList.contains('focus-mode')) {
                toggleFocusMode();
            }
        });

                "author": "datepsych",
                "url": "https://x.com/datepsych/status/1875947553608630702",
                "content": "1960s: Most people engaged in multiple social activities on a regular basis. This was the height of American participation in social groups. At no point in the past span of 150 years were Americans more socially engaged. Americans of all age groups had much larger groups of friends. They did more team sports. They joined more associations, from the Freemasons to the PTA to school Glee Clubs. They spent more time with extended family. If you wanted to do anything at all you had to do it with people. / Today: At no point in the recorded data have Americans, especially young Americans, been more isolated. This is not a “dating crisis.” That is just one facet of it. Young men went from an average of 10 friends to 1 friend. Young men went from weekly attendance at house parties to 50% having never gone to a party. Every single group social event that was once big has declined. / What has increased? Forms of solitary entertainment. Television, video games, social media, and pornography. / Average people in the 1960s did not “do nothing” and have the world handed to them. They did all of the things that young men never, ever do now. They reaped the rewards of those things. Young men today pay the consequences for not engaging in those social activities. / Best book for understanding this trend: [Bowling Alone]",
